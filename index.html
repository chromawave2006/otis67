<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Luau Obfuscator</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --accent-color: #45f3ff;
            --text-color: #c5c6c7;
            --text-bright: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            height: 60vh;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        label {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-bright);
        }

        textarea {
            flex: 1;
            background: #0b0c10;
            border: 1px solid #45f3ff33;
            color: #66fcf1;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            border-radius: 4px;
            resize: none;
            font-size: 14px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            background-color: var(--accent-color);
            color: #0b0c10;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
        }
    </style>
</head>

    </header>

            <label for="inputCode">Source Roblox Lua Code</label>
            <textarea id="inputCode" placeholder="print('Hello from Roblox!')"></textarea>
        </div>

            <label for="outputCode">Obfuscated Code (Roblox Safe)</label>
            <textarea id="outputCode" readonly placeholder="Your Roblox-compatible code will appear here..."></textarea>
        </div>
    </div>

    <div class="controls">
        <button onclick="obfuscateRobloxCode()">Obfuscate for Roblox</button>
    </div>
